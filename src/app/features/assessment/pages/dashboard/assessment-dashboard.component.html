<div class="dashboard-container">
  <h1>Evaluación de Desempeño</h1>

  <app-current-periods-carousel (onSelectPeriod)="selectedPeriod.set($event)" />
  <div class="header-actions">
    <button class="btn btn-primary" (click)="openCreateModal()">
      + Crear Evaluación
    </button>
  </div>

  <div class="table-card shadow-sm">
    <div class="table-header">
      <h2>Evaluaciones en Progreso</h2>
      <p>Matriz de evaluadores y evaluados</p>
    </div>

    @if (selectedPeriod(); as period) {
      <app-assessment-table
        [size]="size()"
        [page]="page()"
        [assessments]="assessments()"
        (onEditAssessment)="openEditModal($event)"
      />
      <app-paginator
        [pageSize]="size()"
        [currentPage]="page()"
        [totalPages]="pages()"
        (pageSizeChange)="onPageSizeChange($event)"
        (onSelectPage)="fetchPage($event)"
      ></app-paginator>
    }
  </div>
</div>

@if (selectedAssessment(); as assessment) {
  <app-edit-assessment-modal
    [assessment]="assessment"
    [isOpen]="isModalOpen()"
    (saveAssessment)="onEditSubmit($event)"
  ></app-edit-assessment-modal>
}

<app-create-assessment-modal
  (closeModal)="closeModal()"
  [isOpen]="isModalOpen()"
  (saveAssessment)="onCreateSubmit($event)"
></app-create-assessment-modal>
