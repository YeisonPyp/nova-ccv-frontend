<div class="carousel-container">
  <div class="carousel-grid">
    @for (period of currentPeriods(); track period.id) {
      <app-period-card
        [period]="period"
        (onSelectPeriod)="selectPeriod($event)"
      />
    } @empty {
      <p class="loading-text">Cargando periodos...</p>
    }
  </div>
</div>
