<div class="dashboard-container">
  <div
    class="header-actions"
    style="margin-bottom: 1rem; display: flex; justify-content: flex-end"
  >
    <button class="btn btn-primary" (click)="openCreateModal()">
      + Crear Periodo
    </button>
  </div>

  <div class="table-container">
    <table class="base-table">
      <thead class="table-header">
        <tr class="table-row">
          <th class="table-header-cell">Periodo</th>
          <th class="table-header-cell">Fecha de inicio</th>
          <th class="table-header-cell">Fecha de fin</th>
          <th class="table-header-cell">Acciones</th>
        </tr>
      </thead>
      <tbody class="table-body">
        @for (period of periods(); track period.id) {
          <tr class="table-row">
            <td class="table-cell">{{ period.name || "Sin nombre" }}</td>
            <td class="table-cell">{{ period.startDate }}</td>
            <td class="table-cell">{{ period.endDate }}</td>
            <td class="table-cell actions-cell">
              <button
                class="btn btn-secondary"
                style="padding: 4px 12px; font-size: 0.8rem"
                (click)="openEditModal(period)"
              >
                Editar
              </button>
            </td>
          </tr>
        } @empty {
          <tr class="table-row">
            <td
              class="table-cell"
              colspan="4"
              style="text-align: center; padding: 2rem"
            >
              No hay periodos disponibles.
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<app-edit-period-modal
  [isOpen]="isModalOpen()"
  [period]="selectedPeriod()"
  (closeModal)="closeModal()"
  (savePeriod)="onSavePeriod($event)"
>
</app-edit-period-modal>
