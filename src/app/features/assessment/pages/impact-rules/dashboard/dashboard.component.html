<div class="dashboard-container" style="padding: 24px">
  <div
    class="header-actions"
    style="
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    "
  >
    <div>
      <h1 style="margin: 0; font-size: 1.5rem; color: #1a1a1b">
        Reglas de impacto
      </h1>
      <p style="margin: 4px 0 0 0; color: #8c8c8c; font-size: 0.9rem">
        Configuración de factores de ponderación por competencia
      </p>
    </div>
    <button class="btn btn-primary" (click)="openCreateModal()">
      + Crear Regla de Impacto
    </button>
  </div>

  <div class="table-wrapper" style="margin-bottom: 1rem">
    <app-dynamic-table
      [data]="rules()"
      [columns]="columns"
      emptyMessage="No hay reglas de impacto disponibles."
    >
      <ng-template #actions let-rule>
        <button
          class="btn btn-secondary"
          style="padding: 4px 12px; font-size: 0.8rem"
          (click)="openEditModal(rule)"
        >
          Editar
        </button>
        <button
          class="btn btn-secondary"
          style="
            padding: 4px 12px;
            font-size: 0.8rem;
            color: #e53e3e;
            border-color: #fed7d7;
          "
          (click)="onDeleteRule(rule)"
        >
          Eliminar
        </button>
      </ng-template>

      <ng-template #customCell let-item let-col="column">
      @if (col.key === "competencies") {
        {{
            buildCompetenciesString(item[col.key])
        }}
      } @else {
        {{ item[col.key] }}
      }
    </ng-template>
    </app-dynamic-table>
  </div>

  <app-paginator
    [pageSize]="size()"
    [currentPage]="page()"
    [totalPages]="totalPages()"
    (pageSizeChange)="onSizeChange($event)"
    (onSelectPage)="onPageChange($event)"
  ></app-paginator>
</div>

<app-impact-rule-modal
  [isOpen]="isModalOpen()"
  [isEdit]="isEdit()"
  [ruleData]="selectedRule()"
  (closeModal)="closeModal()"
  (saveRules)="onSaveRules($event)"
></app-impact-rule-modal>
