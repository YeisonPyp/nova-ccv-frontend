<div class="dashboard-container" style="padding: 24px">
  <div
    class="header-actions"
    style="
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    "
  >
    <div>
      <h1 style="margin: 0; font-size: 1.5rem; color: #1a1a1b">Empleados</h1>
      <p style="margin: 4px 0 0 0; color: #8c8c8c; font-size: 0.9rem">
        Gestión de empleados de la empresa
      </p>
    </div>
    <button class="btn btn-primary" (click)="openCreateModal()">
      + Crear Empleado
    </button>
  </div>

  <div class="table-wrapper" style="margin-bottom: 1rem">
    <app-dynamic-table
      [data]="employees()"
      [columns]="columns"
      emptyMessage="No hay empleados disponibles."
    >
      <ng-template #actions let-employee>
        <button
          class="btn btn-secondary"
          style="padding: 4px 12px; font-size: 0.8rem"
          (click)="openEditModal(employee)"
        >
          Editar
        </button>
        <button
          class="btn btn-secondary"
          style="
            padding: 4px 12px;
            font-size: 0.8rem;
            color: #e53e3e;
            border-color: #fed7d7;
          "
          (click)="onDeleteEmployee(employee)"
        >
          Eliminar
        </button>
      </ng-template>
    </app-dynamic-table>
  </div>

  <app-paginator
    [pageSize]="size()"
    [currentPage]="page()"
    [totalPages]="totalPages()"
    (pageSizeChange)="onSizeChange()"
    (onSelectPage)="onPageChange()"
  ></app-paginator>
</div>

<app-employee-modal
  [isOpen]="isModalOpen()"
  [isEdit]="isEdit()"
  [employeeData]="selectedEmployee()"
  (closeModal)="closeModal()"
  (saveEmployee)="onSaveEmployee()"
></app-employee-modal>
